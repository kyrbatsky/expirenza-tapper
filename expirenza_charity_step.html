<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,700;0,6..12,800&display=swap');
:root{
  --ep:#1572E4;
  --ebg-top:#C8DCFA;
  --ebg-bot:#FFF8CC;
  --ecard:#FFFFFF;
  --et1:#0F1B2D;
  --et2:#6B7A8D;
  --ebrd:#DDE6F2;
  --echip:#EDF3FC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(145deg,#1A0B3D 0%,#0D0620 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px;font-family:'Nunito Sans',sans-serif}

/* ── Phone shell ── */
.ph{width:360px;background:linear-gradient(180deg,var(--ebg-top) 0%,#E6F0FD 38%,#FFF5CC 100%);overflow:hidden;display:flex;flex-direction:column;border-radius:36px;box-shadow:0 20px 60px rgba(0,0,0,.22);min-height:700px}

/* ── Phase reveal ── */
.phase-reveal{opacity:0;transform:translateY(16px);transition:opacity .55s cubic-bezier(0.22,1,0.36,1),transform .55s cubic-bezier(0.22,1,0.36,1)}
.phase-reveal.phase-show{opacity:1;transform:translateY(0)}

/* ── Page header ── */
.pg-hdr{padding:22px 20px 16px;flex-shrink:0}
.pg-ttl{font-size:20px;font-weight:800;color:var(--et1);line-height:1.25;margin-bottom:4px}
.pg-sub{font-size:13px;color:var(--et2);line-height:1.4}
.pg-sub b{color:var(--ep);font-weight:700}

/* ── Scroll outer & hint ── */
.scrl-outer{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.scrl{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 12px 16px;display:flex;flex-direction:column;gap:10px}
.scroll-hint{position:absolute;bottom:0;left:0;right:0;height:90px;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:13px;opacity:0;transition:opacity .5s ease}
.scroll-hint.hint-on{opacity:1}
.sh-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,248,204,0) 0%,#FFF5CC 68%)}
.sh-arrow{position:relative;z-index:1;width:28px;height:28px;border-radius:50%;background:var(--ep);display:flex;align-items:center;justify-content:center;animation:sh-bounce 1.5s ease-in-out infinite}
@keyframes sh-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* ── Card base ── */
.card{background:var(--ecard);border-radius:20px;border:.5px solid var(--ebrd);overflow:hidden;flex-shrink:0;box-shadow:0 2px 12px rgba(21,114,228,.08)}

/* ── Org block ── */
.org-row{display:flex;align-items:flex-start;gap:12px;padding:16px 16px 12px}
.org-logo{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative;background:#1A1A1A;display:flex;align-items:center;justify-content:center;font-size:20px}
.org-info{flex:1}
.org-nm{font-size:15px;font-weight:800;color:var(--et1);line-height:1.25;margin-bottom:3px}
.org-ds{font-size:12px;color:var(--et2);line-height:1.5}
.org-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--ep);background:#EAF3FD;padding:3px 8px;border-radius:20px;margin-top:5px}

/* ── Counter strip ── */
.cnt-strip{display:flex;align-items:center;gap:12px;background:#EDF3FC;border-top:.5px solid var(--ebrd);padding:12px 16px}
.cnt-flag{font-size:24px;flex-shrink:0;line-height:1}
.cnt-num{font-size:14px;font-weight:800;color:var(--et1);line-height:1.4}
.cnt-num span{color:var(--ep)}
.cnt-lbl{font-size:12px;font-weight:700;color:var(--ep);margin-top:1px}

/* ── Donation buttons ── */
.don-wrap{padding:14px 16px 4px}
.don-label{font-size:12px;font-weight:700;color:var(--et2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.don-btns{display:flex;gap:9px}
.don-btn{flex:1;background:var(--ecard);border:1.5px solid var(--ebrd);border-radius:14px;padding:13px 6px;cursor:pointer;text-align:center;transition:background .18s,border-color .18s,transform .12s;font-family:'Nunito Sans',sans-serif}
.don-btn:active{transform:scale(.96)}
.don-btn.act{background:var(--ep);border-color:var(--ep)}
.don-btn-amt{font-size:16px;font-weight:800;color:var(--et1);transition:color .18s;display:block}
.don-btn-lbl{font-size:11px;color:var(--et2);transition:color .18s;display:block;margin-top:2px}
.don-btn.act .don-btn-amt,.don-btn.act .don-btn-lbl{color:#fff}
.don-skip{text-align:center;font-size:12px;color:var(--et2);padding:10px 0 14px;cursor:pointer;opacity:.6}
.don-skip:hover{opacity:1}

/* ── Pct line ── */
.pct-line{text-align:center;padding:0 16px 14px;opacity:0;transition:opacity .4s ease}
.pct-line.show{opacity:1}
.pct-pill{display:inline-block;font-size:12px;font-weight:700;color:#1572E4;background:#EAF3FD;padding:4px 14px;border-radius:99px}

/* ── Micro confirm ── */
.micro-confirm{text-align:center;padding:6px 16px 4px;max-height:0;overflow:hidden;opacity:0;transition:max-height .5s cubic-bezier(0.22,1,0.36,1),opacity .4s ease}
.micro-confirm.show{max-height:120px;opacity:1}
.mc-icon{font-size:28px;display:block;margin-bottom:6px;line-height:1}
.mc-txt{font-size:14px;font-weight:800;color:var(--et1);line-height:1.35}

/* ── Pay block ── */
.pay-card{background:var(--ecard);border-radius:20px;border:.5px solid var(--ebrd);padding:14px 16px 16px;flex-shrink:0;box-shadow:0 2px 12px rgba(21,114,228,.07)}
.tot-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tot-l{font-size:14px;color:var(--et2);transition:color .3s}
.tot-l.with-don{color:var(--ep);font-weight:700}
.tot-right{position:relative}
.tot-v{font-size:22px;font-weight:800;color:var(--et1)}
.tot-delta{font-size:13px;font-weight:700;opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s;white-space:nowrap;position:absolute;right:0;top:-26px;padding:4px 11px;border-radius:20px}
.tot-delta.show{opacity:1;transform:translateY(0)}
.pay-mono{width:100%;background:#0F1B2D;color:white;border:none;border-radius:999px;padding:15px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Nunito Sans',sans-serif;font-weight:700}
.pay-row{display:flex;gap:10px;margin-top:10px}
.pay-apple{flex:1;background:#0F1B2D;color:white;border:none;border-radius:999px;padding:13px 8px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;font-family:'Nunito Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px}
.pay-card-btn{flex:1;background:var(--ecard);color:var(--et1);border:1.5px solid var(--ebrd);border-radius:999px;padding:13px 8px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;font-family:'Nunito Sans',sans-serif}
.disclaimer{text-align:center;font-size:11px;color:var(--et2);margin-top:10px}
.disclaimer span{color:var(--ep)}
</style>

<div class="ph">
<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">

  <!-- Page header -->
  <div class="pg-hdr phase-reveal" id="pgHdr">
    <div class="pg-ttl">"Бойові" для захисників 🇺🇦</div>
  </div>

  <div class="scrl-outer">
    <div class="scrl" id="mainScrl">

      <!-- Charity card -->
      <div class="card phase-reveal" id="chCard">

        <!-- Org row -->
        <div class="org-row">
          <div class="org-logo">🛡️</div>
          <div class="org-info">
            <div class="org-nm">Повернись живим</div>
            <div class="org-badge">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="#1572E4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Верифікований фонд
            </div>
          </div>
        </div>

        <!-- Counter strip -->
        <div class="cnt-strip">
          <span class="cnt-flag">🇺🇦</span>
          <div>
            <div class="cnt-num">1 247 гостей вже долучились.</div>
            <div class="cnt-num">Разом — <span id="cnt">18 450</span> ₴. А ти?</div>
          </div>
        </div>

        <!-- Donation buttons -->
        <div class="don-wrap">
          <div class="don-label">Сума внеску</div>
          <div class="don-btns">
            <button class="don-btn" id="d0" onclick="pickDon(0,this)">
              <span class="don-btn-amt">+ 50 ₴</span>
              <span class="don-btn-lbl">підтримка</span>
            </button>
            <button class="don-btn" id="d1" onclick="pickDon(1,this)">
              <span class="don-btn-amt">+ 100 ₴</span>
              <span class="don-btn-lbl">від серця</span>
            </button>
            <button class="don-btn" id="d2" onclick="pickDon(2,this)">
              <span class="don-btn-amt">+ 150 ₴</span>
              <span class="don-btn-lbl">героям</span>
            </button>
          </div>
          <div class="don-skip" onclick="skipDon()">Не зараз</div>
        </div>

        <div class="micro-confirm" id="microConfirm">
          <span class="mc-icon">💙</span>
          <div class="mc-txt">Дякуємо, що долучаєтесь<br>до підтримки наших захисників</div>
        </div>

        <div class="pct-line" id="pctLine">
          <span class="pct-pill" id="pctTxt">це лише 3.6% від вашого рахунку</span>
        </div>

      </div>

      <!-- Pay block -->
      <div class="pay-card phase-reveal" id="payFtr">
        <div class="tot-r">
          <span class="tot-l" id="totLbl">До сплати</span>
          <div class="tot-right">
            <div class="tot-delta" id="totDelta"></div>
            <span class="tot-v" id="tot">1 100 ₴</span>
          </div>
        </div>
        <button class="pay-mono"><span style="font-weight:400;letter-spacing:-.3px">mono</span>&nbsp;<span style="font-weight:700">Pay</span></button>
        <div class="pay-row">
          <button class="pay-apple">
            <svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M11.35 8.26c-.02-2.04 1.67-3.02 1.74-3.07-0.95-1.39-2.42-1.58-2.95-1.6-1.26-.13-2.46.74-3.1.74-.64 0-1.63-.72-2.68-.7-1.38.02-2.65.8-3.36 2.04C-.6 8.1.48 12.38 1.96 14.7c.73 1.06 1.61 2.24 2.75 2.2 1.1-.04 1.52-.71 2.85-.71 1.33 0 1.7.71 2.86.69 1.19-.02 1.94-1.08 2.66-2.14.84-1.22 1.19-2.41 1.21-2.47-.03-.01-2.32-.89-2.34-3.01zM9.3 2.44C9.9 1.7 10.3.69 10.18-.31c-.87.03-1.93.58-2.55 1.31-.56.65-1.05 1.69-.92 2.68.97.07 1.96-.49 2.59-1.24z" fill="white"/></svg>
            Pay
          </button>
          <button class="pay-card-btn">Карткою онлайн</button>
        </div>
        <div class="disclaimer">Продовжуючи, ви приймаєте <span>Правила роботи сервісу</span></div>
      </div>

    </div>

    <div class="scroll-hint" id="scrollHint">
      <div class="sh-grad"></div>
      <div class="sh-arrow"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v9" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M3.5 7.5L7 11l3.5-3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

</div>
</div>

<script>
var BASE = 1100;
var DON_AMTS = [50, 100, 150];
var donIdx = -1;
var deltaTimer = null;
var cntInterval = null;

function total(){ return BASE + (donIdx >= 0 ? DON_AMTS[donIdx] : 0); }
function fmtUah(n){ return n.toLocaleString('uk-UA').replace(/,/g,' ') + ' ₴'; }

// ── Init on load ──
window.addEventListener('load', function(){
  setTimeout(function(){ document.getElementById('pgHdr').classList.add('phase-show'); }, 60);
  setTimeout(function(){ document.getElementById('chCard').classList.add('phase-show'); }, 240);
  setTimeout(function(){
    document.getElementById('payFtr').classList.add('phase-show');
    setTimeout(autoSelectDon, 480);
  }, 480);
  setTimeout(checkScrollHint, 900);
  startLiveCounter();
});

function autoSelectDon(){
  pickDon(1, document.querySelectorAll('.don-btn')[1]);
}

// ── Donation ──
function pickDon(i, el){
  var prev = total();
  document.querySelectorAll('.don-btn').forEach(function(s){ s.classList.remove('act'); });
  el.classList.add('act');
  donIdx = i;
  var next = total();
  if(next !== prev){ animateTotal(prev, next); showDelta(DON_AMTS[i]); }
  // Label
  document.getElementById('totLbl').textContent = 'До сплати + бойові 🇺🇦';
  document.getElementById('totLbl').classList.add('with-don');
  // Percentage line
  var pct = Math.round(DON_AMTS[i] / BASE * 1000) / 10;
  document.getElementById('pctTxt').textContent = 'це лише ' + pct + '% від вашого рахунку';
  document.getElementById('pctLine').classList.add('show');
  // Micro confirm
  document.getElementById('microConfirm').classList.add('show');
}

function skipDon(){
  var prev = total();
  donIdx = -1;
  document.querySelectorAll('.don-btn').forEach(function(s){ s.classList.remove('act'); });
  animateTotal(prev, total());
  document.getElementById('totLbl').textContent = 'До сплати';
  document.getElementById('totLbl').classList.remove('with-don');
  document.getElementById('pctLine').classList.remove('show');
  document.getElementById('microConfirm').classList.remove('show');
}

// ── Animate total ──
var totTimer;
function animateTotal(from, to){
  if(totTimer) clearInterval(totTimer);
  var el = document.getElementById('tot');
  var steps = 14, step = (to - from) / steps, cur = from, i = 0;
  totTimer = setInterval(function(){
    i++; cur += step;
    el.textContent = fmtUah(Math.round(cur));
    if(i >= steps){ el.textContent = fmtUah(to); clearInterval(totTimer); }
  }, 18);
}

function showDelta(a){
  var el = document.getElementById('totDelta');
  if(deltaTimer) clearTimeout(deltaTimer);
  el.style.background = '#EAF3FD'; el.style.color = '#1572E4';
  el.textContent = '🇺🇦 +' + a + ' ₴';
  el.classList.add('show');
  deltaTimer = setTimeout(function(){ el.classList.remove('show'); }, 1000);
}

// ── Live counter ──
function startLiveCounter(){
  if(cntInterval) return;
  var el = document.getElementById('cnt'), cur = 18450;
  function tick(){
    var donation = DON_AMTS[Math.floor(Math.random() * DON_AMTS.length)];
    cur += donation;
    el.style.transition = 'color .3s'; el.style.color = '#1572E4';
    el.textContent = cur.toLocaleString('uk-UA').replace(/,/g,' ');
    setTimeout(function(){ el.style.color = ''; }, 700);
    cntInterval = setTimeout(tick, 4000 + Math.floor(Math.random() * 5000));
  }
  cntInterval = setTimeout(tick, 3000 + Math.floor(Math.random() * 3000));
}

// ── Scroll hint ──
function checkScrollHint(){
  var scrl = document.getElementById('mainScrl');
  if(scrl.scrollHeight <= scrl.clientHeight + 40) return;
  var hint = document.getElementById('scrollHint');
  hint.classList.add('hint-on');
  scrl.addEventListener('scroll', function(){ hint.classList.remove('hint-on'); }, { passive: true, once: true });
  setTimeout(function(){
    easeScroll(scrl, 70, 800, function(){
      setTimeout(function(){ easeScroll(scrl, 0, 600, null); }, 700);
    });
  }, 200);
}
function easeScroll(el, target, dur, cb){
  var start = el.scrollTop, change = target - start, t0 = null;
  function step(ts){
    if(!t0) t0 = ts;
    var p = Math.min((ts - t0) / dur, 1), ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
    el.scrollTop = start + change * ease;
    if(p < 1) requestAnimationFrame(step); else if(cb) cb();
  }
  requestAnimationFrame(step);
}
</script>
